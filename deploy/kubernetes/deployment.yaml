apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentauth
  namespace: agentauth
  labels:
    app.kubernetes.io/name: agentauth
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: agentauth
  annotations:
    deployment.kubernetes.io/revision: "1"
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: agentauth
      app.kubernetes.io/component: server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentauth
        app.kubernetes.io/version: "0.1.0"
        app.kubernetes.io/component: server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: agentauth
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: agentauth

      containers:
        - name: agentauth
          image: ghcr.io/vividlogic-software/agentauth:0.1.0
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP

          env:
            - name: AGENTAUTH_HOST
              value: "0.0.0.0"
            - name: AGENTAUTH_PORT
              value: "8080"
            - name: AGENTAUTH_LOG_LEVEL
              value: "info"
            - name: AGENTAUTH_POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: agentauth-secrets
                  key: postgres-dsn
            - name: AGENTAUTH_REDIS_ADDR
              valueFrom:
                configMapKeyRef:
                  name: agentauth-config
                  key: redis-addr
            - name: AGENTAUTH_NATS_URL
              valueFrom:
                configMapKeyRef:
                  name: agentauth-config
                  key: nats-url
            - name: AGENTAUTH_TRUST_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: agentauth-config
                  key: trust-domain
            - name: AGENTAUTH_JWT_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: agentauth-secrets
                  key: jwt-signing-key

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi

          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 20

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: config
              mountPath: /etc/agentauth
              readOnly: true

      volumes:
        - name: tmp
          emptyDir: {}
        - name: config
          configMap:
            name: agentauth-config

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: agentauth
                topologyKey: kubernetes.io/hostname
