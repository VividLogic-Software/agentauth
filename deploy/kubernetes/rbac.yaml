apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentauth
  namespace: agentauth
  labels:
    app.kubernetes.io/name: agentauth
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agentauth
  namespace: agentauth
rules:
  # Allow AgentAuth to perform Kubernetes workload attestation via TokenReview
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
  # Allow reading ConfigMaps in the agentauth namespace
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agentauth
  namespace: agentauth
subjects:
  - kind: ServiceAccount
    name: agentauth
    namespace: agentauth
roleRef:
  kind: Role
  name: agentauth
  apiGroup: rbac.authorization.k8s.io
