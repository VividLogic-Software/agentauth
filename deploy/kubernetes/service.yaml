apiVersion: v1
kind: Service
metadata:
  name: agentauth
  namespace: agentauth
  labels:
    app.kubernetes.io/name: agentauth
    app.kubernetes.io/component: server
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: agentauth
    app.kubernetes.io/component: server
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: agentauth-headless
  namespace: agentauth
  labels:
    app.kubernetes.io/name: agentauth
    app.kubernetes.io/component: server
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: agentauth
    app.kubernetes.io/component: server
  ports:
    - name: http
      port: 8080
      targetPort: http
