apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentauth.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agentauth.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "agentauth.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "agentauth.selectorLabels" . | nindent 8 }}
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
    spec:
      serviceAccountName: {{ include "agentauth.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: 30
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: agentauth
          image: {{ include "agentauth.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            {{- if .Values.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
            {{- end }}
          env:
            - name: AGENTAUTH_HOST
              value: "0.0.0.0"
            - name: AGENTAUTH_PORT
              value: "8080"
            - name: AGENTAUTH_LOG_LEVEL
              value: {{ .Values.config.logLevel | quote }}
            - name: AGENTAUTH_TRUST_DOMAIN
              value: {{ .Values.config.trustDomain | quote }}
            - name: AGENTAUTH_REDIS_ADDR
              value: {{ .Values.redis.addr | quote }}
            - name: AGENTAUTH_NATS_URL
              value: {{ .Values.nats.url | quote }}
            - name: AGENTAUTH_POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: postgres-dsn
            - name: AGENTAUTH_JWT_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: jwt-signing-key
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
