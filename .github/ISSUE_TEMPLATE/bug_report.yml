name: Bug Report
description: Report a bug in AgentAuth
labels: ["bug", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out this form as completely as possible.

        **Security vulnerabilities:** Please do NOT report security issues here. See [SECURITY.md](../SECURITY.md) for responsible disclosure.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: I have searched the existing issues and this is not a duplicate
          required: true
        - label: I am using a supported version of AgentAuth
          required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of AgentAuth is affected?
      options:
        - Server (agentauth-server)
        - CLI (agentauth-cli)
        - Go SDK / Middleware
        - Python SDK
        - TypeScript SDK
        - Docker / Kubernetes deployment
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: AgentAuth Version
      placeholder: "e.g. v0.1.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the bug.
      placeholder: |
        1. Configure AgentAuth with...
        2. Issue an identity with...
        3. Call `mint_token` with...
        4. Observe error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages and stack traces.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Your environment details.
      placeholder: |
        - OS: Ubuntu 22.04 / macOS 14 / Windows 11
        - Go version: 1.22.x
        - Python version: 3.12.x
        - Node.js version: 20.x
        - Kubernetes version (if applicable): 1.28
        - Database versions: PostgreSQL 16, Redis 7
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Configuration (sanitized)
      description: Relevant configuration, with secrets removed.
      render: yaml

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Server logs, error output, etc. with sensitive data removed.
      render: text

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem.
