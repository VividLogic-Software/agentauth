name: Feature Request
description: Suggest a new feature or improvement for AgentAuth
labels: ["enhancement", "needs-discussion"]

body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to suggest an improvement to AgentAuth!
        Please provide as much detail as possible to help us evaluate the request.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I have read the roadmap in README.md and this is not already planned
          required: true

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      options:
        - Identity / SPIFFE
        - Credential Brokering / OAuth
        - DPoP / Token Security
        - Delegation / A2A
        - Policy Engine (OPA)
        - Audit Log
        - MCP Integration
        - Python SDK
        - TypeScript SDK
        - Go SDK / Middleware
        - CLI
        - Kubernetes / Deployment
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? What are you trying to accomplish?
      placeholder: "When building an AI agent that..., I need to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe your proposed feature in detail.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What alternatives have you considered? Why are they insufficient?

  - type: textarea
    id: api
    attributes:
      label: API / Interface Sketch
      description: If applicable, sketch what the API or configuration would look like.
      render: go

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to you?
      options:
        - Critical — blocking my use case
        - High — significantly improves my use case
        - Medium — nice to have
        - Low — minor improvement
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to submit a PR to implement this feature
        - label: I am willing to help test this feature once implemented

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Links, references, related specs, or other context.
